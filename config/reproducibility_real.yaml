# Configuration for reproducibility analyses on ds007318 (real data).
#
# Run prep first:
#   python scripts/prep_reproducibility_inputs.py
#
# Then run the analyses:
#   python scripts/run_reproducibility.py --config config/reproducibility_real.yaml
#
# Inputs live in data/repro_inputs/ (created by the prep script).
# Outputs go to reports/reproducibility/.

project:
  name: reproducibility_real
  random_seed: 42
  n_jobs: 4

paths:
  # Inputs: flat directories created by prep_reproducibility_inputs.py
  fc_input_dir: ./data/repro_inputs/connectivity        # sub-*_run-*_fc.npy
  reho_input_dir: ./data/repro_inputs/reho              # sub-*_run-*_reho.npy
  ica_input_dir: ./data/repro_inputs/ica                # seeds/ and lorocv/
  graph_input_dir: ./data/repro_inputs/connectivity     # reuses fc layout
  dfc_input_dir: ./data/repro_inputs/roi_timeseries     # sub-*_run-*_roi.npy
  roi_labels: ./data/repro_inputs/atlas/roi_labels.csv
  output_root: ./reports/reproducibility

# ---------------------------------------------------------------------------
# Static FC within-subject vs between-subject reproducibility (Step 1.1)
# ---------------------------------------------------------------------------
fc:
  enabled: true
  match_between_by_run_index: true
  fisher_z_before_tests: true
  n_bootstrap: 1000
  test: wilcoxon
  output_csv: fc_within_vs_between.csv

# ---------------------------------------------------------------------------
# ReHo run-to-run stability (Step 1.2)
# ---------------------------------------------------------------------------
reho:
  enabled: true
  match_between_by_run_index: true
  fisher_z_before_tests: true
  n_bootstrap: 1000
  output_matrix: reho_similarity_matrix.npy
  output_csv: reho_summary.csv

# ---------------------------------------------------------------------------
# ICA stability across seeds and run subsets (Step 1.3)
#
# NOTE: Uses temporal ICA on Schaefer-200 parcellated time series
# (see prep_reproducibility_inputs.py, Stage 5 docstring).
# ---------------------------------------------------------------------------
ica:
  stability:
    enabled: true
    n_components: 20
    seeds: [1, 2, 3, 4, 5]
    leave_one_run_out: true
    robust_threshold: 0.7
    seeds_subdir: seeds
    lorocv_subdir: lorocv
    output_seeds_csv: ica_stability_seeds.csv
    output_lorocv_csv: ica_stability_lorocv.csv

# ---------------------------------------------------------------------------
# Graph metric stability — bootstrap + LORO-CV (Step 1.4)
# ---------------------------------------------------------------------------
graph:
  stability:
    enabled: true
    density_thresholds: [0.10, 0.15, 0.20]
    primary_threshold: 0.15
    metrics: [modularity, global_efficiency, clustering]
    community_algorithm: louvain
    n_bootstrap: 500
    leave_one_run_out: true
    cv_warning_threshold: 0.20
    output_csv: graph_metrics_bootstrap.csv

# ---------------------------------------------------------------------------
# Dynamic FC window-size sensitivity (Phase 2)
# ---------------------------------------------------------------------------
dfc:
  enabled: true
  window_sizes: [20, 30, 40]
  step_size: 1
  k_states: 4
  output_per_window_csv: dfc_sensitivity_per_window.csv
  output_ari_csv: dfc_sensitivity_ari.csv
  output_json: dfc_sensitivity.json

# ---------------------------------------------------------------------------
# Canonical-network biological anchor (Phase 3)
# ---------------------------------------------------------------------------
network_anchor:
  enabled: true
  n_permutations: 1000
  network_order: [Vis, SomMot, DorsAttn, SalVentAttn, Limbic, Cont, Default]
  label_overrides: {}
  group_fc_path: null
  output_summary: network_anchor_summary.csv
  output_blocks: network_anchor_block_means.csv
  output_matrix: network_anchor_reordered.npy

# ---------------------------------------------------------------------------
# Validation scorecard — Table 1
# ---------------------------------------------------------------------------
scorecard:
  enabled: true
  output_markdown: scorecard.md
  output_csv: scorecard.csv
  graph_primary_metric: modularity

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
execution:
  run_order:
    - fc
    - reho
    - ica
    - graph
    - dfc
    - network_anchor
    - scorecard
  continue_on_error: true
  write_manifest: true
